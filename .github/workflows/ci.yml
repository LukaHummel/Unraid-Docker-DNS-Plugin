name: CI
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: curl
          coverage: none
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: sudo apt-get update && sudo apt-get install -y shellcheck libxml2-utils
      - run: composer install --no-interaction --prefer-dist
      - run: npm ci
      - run: ./test.sh
