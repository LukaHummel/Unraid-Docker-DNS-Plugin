name: Release plugin
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Slackware package and release plugin file
        run: ./build.sh "${GITHUB_REF_NAME#v}" 1
      - name: Verify generated checksum
        run: |
          package="dist/docker.dns-${GITHUB_REF_NAME#v}-noarch-1.txz"
          checksum="$(md5sum "$package" | awk '{print $1}')"
          grep -Fq "<MD5>$checksum</MD5>" dist/docker.dns.plg
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/docker.dns-*-noarch-1.txz
            dist/docker.dns.plg

